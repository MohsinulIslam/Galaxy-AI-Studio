<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy AI Studio | Mohsin</title>
    <!-- Tailwind for rapid cosmic styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide for cosmic icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked for beautiful markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020408;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(8, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(79, 70, 229, 0.1);
        }

        .cosmic-gradient {
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.1), transparent);
        }

        .message-ai {
            background: rgba(14, 17, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top-left-radius: 4px;
        }

        .message-user {
            background: #4f46e5;
            border-top-right-radius: 4px;
        }

        pre {
            background: #000 !important;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin: 1rem 0;
            overflow-x: auto;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(10px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(10px) rotate(-360deg); }
        }
        .orbiting { animation: orbit 3s linear infinite; }
    </style>
</head>
<body class="h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 glass-panel hidden lg:flex flex-col">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="sparkles" class="text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-xl tracking-tight text-white">Galaxy AI</h1>
                    <p class="text-[10px] text-indigo-400 font-mono tracking-widest uppercase opacity-60">Studio v3.0</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-4">
            <button onclick="resetChat()" class="w-full flex items-center gap-3 p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all text-sm font-medium group">
                <i data-lucide="plus" class="group-hover:rotate-90 transition-transform"></i>
                New Universe
            </button>

            <div class="space-y-1">
                <p class="px-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Transmission Logs</p>
                <div id="history-list" class="space-y-1">
                    <!-- History items injected here -->
                </div>
            </div>
        </nav>

        <div class="p-6 border-t border-white/5">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-indigo-500/5 border border-indigo-500/10">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-bold text-sm shadow-lg">M</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-xs font-bold truncate text-white">Mohsin</p>
                    <p class="text-[10px] text-indigo-400/70 truncate">Apparel Engineer</p>
                </div>
                <a href="#" class="text-slate-500 hover:text-white transition-colors"><i data-lucide="github" size="18"></i></a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative cosmic-gradient">
        <!-- Header -->
        <header class="h-20 flex items-center justify-between px-8 bg-black/40 backdrop-blur-xl border-b border-white/5 z-20">
            <div class="flex p-1 bg-white/5 rounded-2xl border border-white/5">
                <button id="chat-mode-btn" onclick="setMode('chat')" class="flex items-center gap-2 px-6 py-2 rounded-xl text-sm font-medium bg-indigo-600 text-white shadow-lg transition-all">
                    <i data-lucide="message-square" size="16"></i> Signal
                </button>
                <button id="image-mode-btn" onclick="setMode('image')" class="flex items-center gap-2 px-6 py-2 rounded-xl text-sm font-medium text-slate-400 hover:text-white transition-all">
                    <i data-lucide="image" size="16"></i> Vision
                </button>
            </div>

            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-[10px] font-mono text-indigo-400/50 uppercase tracking-tighter">System Pulse</span>
                    <span id="status-text" class="text-xs font-mono text-emerald-500 uppercase">Stable</span>
                </div>
                <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.4)]"></div>
            </div>
        </header>

        <!-- Message Feed -->
        <div id="chat-feed" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 scrollbar-hide">
            <!-- Empty State -->
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-xl mx-auto space-y-6">
                <div class="relative">
                    <div class="absolute inset-0 bg-indigo-500/20 blur-3xl rounded-full"></div>
                    <div class="relative p-8 rounded-[2.5rem] bg-indigo-500/10 border border-indigo-500/20 shadow-2xl">
                        <i data-lucide="zap" size="60" class="text-indigo-400"></i>
                    </div>
                </div>
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Welcome to Galaxy Studio</h2>
                    <p class="text-slate-400 text-sm leading-relaxed">
                        The frontier of cosmic intelligence. Optimized for your workspace.
                    </p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 md:p-10">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600 rounded-[2.5rem] blur-2xl opacity-0 group-focus-within:opacity-10 transition-all duration-1000"></div>
                
                <div class="relative flex items-end bg-[#0d1117] border border-white/10 rounded-[2rem] p-2 pr-4 shadow-2xl">
                    <textarea 
                        id="user-input"
                        rows="1" 
                        placeholder="Broadcast signal..." 
                        class="flex-1 bg-transparent border-none focus:ring-0 py-5 px-6 text-sm resize-none placeholder:text-slate-700 outline-none"
                    ></textarea>

                    <button 
                        id="send-btn"
                        onclick="handleSubmit()"
                        class="mb-1 w-12 h-12 rounded-2xl flex items-center justify-center bg-indigo-600 text-white shadow-xl shadow-indigo-600/30 hover:scale-105 active:scale-95 transition-all"
                    >
                        <i data-lucide="send" size="18"></i>
                    </button>
                </div>
                <div class="mt-4 flex justify-center gap-6 opacity-20 text-[9px] font-mono tracking-[0.3em] uppercase">
                    <span class="flex items-center gap-1"><i data-lucide="sun" size="10"></i> Core Sync</span>
                    <span class="flex items-center gap-1"><i data-lucide="moon" size="10"></i> Lunar Link</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            API_KEY: "", // Replace with your Gemini API Key
            CHAT_MODEL: "gemini-2.5-flash-preview-09-2025",
            IMAGE_MODEL: "imagen-4.0-generate-001"
        };

        let currentMode = 'chat';
        let isGenerating = false;

        // Initialize Icons
        lucide.createIcons();

        // Handle Textarea Auto-height
        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        });

        // Set Communication Mode
        function setMode(mode) {
            currentMode = mode;
            const chatBtn = document.getElementById('chat-mode-btn');
            const imgBtn = document.getElementById('image-mode-btn');
            const input = document.getElementById('user-input');

            if (mode === 'chat') {
                chatBtn.classList.add('bg-indigo-600', 'text-white');
                chatBtn.classList.remove('text-slate-400');
                imgBtn.classList.remove('bg-purple-600', 'text-white');
                imgBtn.classList.add('text-slate-400');
                input.placeholder = "Broadcast signal...";
            } else {
                imgBtn.classList.add('bg-purple-600', 'text-white');
                imgBtn.classList.remove('text-slate-400');
                chatBtn.classList.remove('bg-indigo-600', 'text-white');
                chatBtn.classList.add('text-slate-400');
                input.placeholder = "Input visual coordinates...";
            }
        }

        // Add Message to Feed
        function addMessage(role, content, type = 'text') {
            const feed = document.getElementById('chat-feed');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-5 animate-in fade-in slide-in-from-bottom-4 duration-500 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit' });
            
            const innerHTML = `
                <div class="w-10 h-10 rounded-2xl flex-shrink-0 flex items-center justify-center shadow-lg border ${role === 'user' ? 'bg-indigo-600 border-indigo-400/30' : 'bg-slate-900 border-slate-800'}">
                    <i data-lucide="${role === 'user' ? 'user' : 'cpu'}" size="20" class="${role === 'ai' ? 'text-indigo-400' : ''}"></i>
                </div>
                <div class="max-w-[85%] md:max-w-[70%] rounded-[2rem] p-6 shadow-2xl ${role === 'user' ? 'bg-indigo-700 text-white rounded-tr-none' : 'message-ai text-slate-100 rounded-tl-none'}">
                    <div class="prose prose-invert max-w-none text-[15px] leading-relaxed">
                        ${type === 'image' 
                            ? `<img src="${content}" class="rounded-2xl border border-white/10 mb-4 w-full shadow-2xl">`
                            : marked.parse(content)
                        }
                    </div>
                    <div class="mt-3 text-[9px] font-mono opacity-30 ${role === 'user' ? 'text-right' : 'text-left'}">
                        LOG_${time}
                    </div>
                </div>
            `;
            
            msgDiv.innerHTML = innerHTML;
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;
            lucide.createIcons();
        }

        // Show Loading Indicator
        function setLoading(loading) {
            isGenerating = loading;
            const btn = document.getElementById('send-btn');
            const statusText = document.getElementById('status-text');
            const indicator = document.getElementById('status-indicator');

            if (loading) {
                btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="18"></i>`;
                statusText.innerText = "Processing...";
                statusText.classList.replace('text-emerald-500', 'text-amber-500');
                indicator.classList.replace('bg-emerald-500', 'bg-amber-500');
                indicator.classList.add('animate-pulse');
            } else {
                btn.innerHTML = `<i data-lucide="send" size="18"></i>`;
                statusText.innerText = "Stable";
                statusText.classList.replace('text-amber-500', 'text-emerald-500');
                indicator.classList.replace('bg-amber-500', 'bg-emerald-500');
                indicator.classList.remove('animate-pulse');
            }
            lucide.createIcons();
        }

        // Exponential Backoff API Wrapper
        async function fetchAI(endpoint, payload, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${endpoint}?key=${CONFIG.API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, delay));
                    return fetchAI(endpoint, payload, retries - 1, delay * 2);
                }
                throw err;
            }
        }

        // Primary Logic
        async function handleSubmit() {
            const inputField = document.getElementById('user-input');
            const prompt = inputField.value.trim();
            if (!prompt || isGenerating) return;

            addMessage('user', prompt);
            inputField.value = '';
            inputField.style.height = 'auto';
            setLoading(true);

            try {
                if (currentMode === 'chat') {
                    const data = await fetchAI(`${CONFIG.CHAT_MODEL}:generateContent`, {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are Galaxy AI. Insightful, precise, and sophisticated." }] }
                    });
                    const response = data.candidates?.[0]?.content?.parts?.[0]?.text || "No signal received.";
                    addMessage('ai', response);
                } else {
                    const data = await fetchAI(`${CONFIG.IMAGE_MODEL}:predict`, {
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    });
                    const imgUrl = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                    addMessage('ai', imgUrl, 'image');
                }
            } catch (err) {
                addMessage('ai', "Transmission error. Unable to link with Galaxy Core.");
            } finally {
                setLoading(false);
            }
        }

        function resetChat() {
            document.getElementById('chat-feed').innerHTML = '';
            location.reload();
        }

        // Enter to Send
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSubmit();
            }
        });
    </script>
</body>
</html>
